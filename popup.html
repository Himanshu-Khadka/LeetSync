<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>LeetSync</title>
    <link rel="stylesheet" href="src/popup.css">
  </head>
  <body>
    <main>
      <header>
        <h1>LeetSync</h1>
        <p>Settings are now handled by the background worker.</p>
      </header>

      <form id="settings-form">
        <label>
          GitHub token
          <input id="token" type="password" autocomplete="off" placeholder="Fine-grained PAT">
        </label>

        <label>
          GitHub owner
          <input id="owner" type="text" placeholder="your-username">
        </label>

        <label>
          Repository
          <input id="repo" type="text" placeholder="leetcode-solutions">
        </label>

        <label>
          Branch
          <input id="branch" type="text" placeholder="main">
        </label>

        <label>
          Base path
          <input id="basePath" type="text" placeholder="leetcode">
        </label>

        <div class="actions">
          <button type="submit">Save</button>
          <button id="test-github" type="button">Test GitHub</button>
        </div>

        <p id="status">Ready</p>
      </form>
    </main>

    <script src="src/popup.js"></script>
  </body>
</html>
